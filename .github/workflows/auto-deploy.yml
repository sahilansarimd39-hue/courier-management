name: Auto Deploy to AWS Amplify

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Deploy to AWS Amplify
      run: |
        echo "🚀 Deployment to AWS Amplify will be triggered automatically"
        echo "📊 AWS Amplify will detect the push and deploy automatically"
        echo "✅ Build completed successfully - AWS Amplify deployment initiated"
